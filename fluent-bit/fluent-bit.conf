[SERVICE]
    Flush           5
    Daemon          Off
    Log_Level       info
    Parsers_File    parsers.conf
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020
    storage.path    /fluent-bit/tail-db/
    storage.sync    normal
    storage.checksum off
    storage.backlog.mem_limit 50M

[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Buffer_Chunk_Size 1M
    Buffer_Max_Size   6M

[FILTER]
    Name     record_modifier
    Match    *
    Record   host ${HOSTNAME}

[FILTER]
    Name         parser
    Match        *
    Key_Name     log
    Parser       json
    Reserve_Data On
    Preserve_Key On

[OUTPUT]
    Name               es
    Match              *
    Host               elasticsearch
    Port               9200
    Logstash_Format    On
    Logstash_Prefix_Key  $tag
    Logstash_DateFormat  %Y.%m.%d
    Generate_ID        On
    Replace_Dots       On
    Retry_Limit        5
    Suppress_Type_Name On

[OUTPUT]
    Name   stdout
    Match  *
    Format json_lines
